services:
  - type: worker
    name: ai-trader-lonewolf
    env: python
    region: ohio
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash start.sh"
    autoDeploy: true
    envVars:
      - key: OPENAI_API_BASE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: ALPACA_API_BASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_PROJECT
        value: "AI-Trader-LoneWolf"
      - key: LANGCHAIN_API_KEY
        sync: false
